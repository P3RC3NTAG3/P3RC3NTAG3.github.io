<!DOCTYPE html>
<html>
    <head>
        <style>
            @font-face {
                font-family: InterNumeric;
                font-display: swap;
                src: url("https://p3rc3ntag3.github.io/projects/dependencies/internum.ttf") format("truetype")
            }
            @font-face {
                font-family: InterVariable;
                font-style: normal;
                font-display: swap;
                src: url('https://rsms.me/inter/font-files/InterVariable.woff2?v=4.1') format('woff2');
            }
            #time {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                font-family: ui-rounded, InterNumeric, InterVariable, sans-serif;
                font-size: 15vw;
                font-feature-settings: "case", "tnum";
                font-variation-settings: "wght" 700, "RDNS" 1;
            }
            body {
                background-color:black;
                color:white;
                margin: 0;
            }
        </style>
        <title>Clock | P3RC3NTAG3</title>
    </head>
    <body>
        <div id="time" onclick="toggleTimeFormat()">12:34:56</div>
        <script>
            var newDate=new Date();
            var clockDiv=document.getElementById("time"); // remove const to support older browsers
            var timeFormat=false;
            function updateClockDiv() {
                newDate=new Date();
                clockDiv.innerHTML=newDate.toLocaleTimeString([],{hour12:timeFormat,hour:"2-digit",minute:"2-digit",second:"2-digit"});
            };
            function toggleTimeFormat() {
                timeFormat=!timeFormat;
                updateClockDiv()
            }
            updateClockDiv();
            setInterval(updateClockDiv,1000);
        </script>
        <noscript>
            <div style="font-size:24px;">This clock requires <b>JavaScript</b> to run. Please enable it in your settings.</div>
            <hr>
            <b>Chrome:</b>
            <ol>
                <li>Type <b>chrome://settings</b> into the address bar</li>
                <li>Go to the <b>Privacy and Security</b> tab</li>
                <li>Click <b>Site settings</b></li>
                <li>Scroll down and click <b>JavaScript</b></li>
                <li>Click on the button labeled <b>Sites can use JavaScript</b></li>
            </ol>
            <hr>
            <b>Firefox:</b>
            <ol>
                <li>
                    Type <b>about:config</b> into the address bar
                    <ul>
                        <li>
                            If a warning pop-up appears, click <b>Accept the Risk and Continue</b><br>
                            However, you shouldn't always trust a website that tells you to do this.
                        </li>
                    </ul>
                </li>
                <li>Find the <code>javascript.enabled</code> preference.</li>
                <li>If <code>javascript.enabled</code> is <code>false</code>, click the Toggle or Reset button to set it to <code>true</code>.</li>
            </ol>
        </noscript>
    </body>
</html>
